# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Rename posts to Jekyll date format
        run: |
          python3 - <<'EOF'
          import os
          import re

          posts_dir = "_posts"
          date_name_re = re.compile(r"^\d{4}-\d{2}-\d{2}-")
          date_field_re = re.compile(r"^\s*date\s*:\s*[\"']?(\d{4}-\d{2}-\d{2})", re.MULTILINE)
          fm_re = re.compile(r"^\ufeff?\s*---\s*\r?\n(.*?)\r?\n---", re.DOTALL)

          checked = 0
          renamed = 0
          skipped = 0

          for root, dirs, files in os.walk(posts_dir):
            # 跳过隐藏目录（例如 .obsidian）
            dirs[:] = [d for d in dirs if not d.startswith('.')]
            for fname in files:
              if not fname.lower().endswith((".md", ".markdown")):
                continue
              checked += 1

              if date_name_re.match(fname):
                skipped += 1
                continue

              fpath = os.path.join(root, fname)
              with open(fpath, encoding="utf-8") as f:
                content = f.read()

              fm = fm_re.search(content)
              if not fm:
                print(f"SKIP (no front matter): {fpath}")
                skipped += 1
                continue

              m = date_field_re.search(fm.group(1))
              if not m:
                print(f"SKIP (no valid date): {fpath}")
                skipped += 1
                continue

              date_str = m.group(1)
              name, ext = os.path.splitext(fname)
              new_fname = f"{date_str}-{name}{ext}"
              new_fpath = os.path.join(root, new_fname)

              if os.path.exists(new_fpath):
                print(f"SKIP (target exists): {new_fpath}")
                skipped += 1
                continue

              os.rename(fpath, new_fpath)
              renamed += 1
              print(f"RENAMED: {fpath} -> {new_fpath}")

          print(f"SUMMARY: checked={checked}, renamed={renamed}, skipped={skipped}")
          EOF
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
